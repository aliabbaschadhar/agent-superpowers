name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch ai-skills data
        # In CI the parent ai-skills repo is not present at ../
        # Clone it to /tmp/ai-skills and point AI_SKILLS_ROOT at it
        run: |
          git clone --depth=1 https://github.com/sickn33/antigravity-awesome-skills.git /tmp/agent-superpowers
        continue-on-error: true

      - name: Run prebuild (copy skills assets)
        run: bun run scripts/prebuild.js
        env:
          AI_SKILLS_ROOT: /tmp/agent-superpowers

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run type-check

      - name: Compile extension (esbuild)
        run: bun run esbuild.config.js
