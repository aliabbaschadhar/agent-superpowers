name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Fetch ai-skills data
        run: |
          git clone --depth=1 https://github.com/aliabbaschadhar/antigravity-awesome-skills.git /tmp/agent-superpowers || \
          git clone --depth=1 https://github.com/sickn33/antigravity-awesome-skills.git /tmp/agent-superpowers
        continue-on-error: true

      - name: Run prebuild
        run: node scripts/prebuild.js
        env:
          AI_SKILLS_ROOT: /tmp/agent-superpowers

      - name: Build production bundle
        run: node esbuild.config.js --production

      - name: Package .vsix
        run: bunx vsce package --no-dependencies

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-superpowers-vsix
          path: "*.vsix"
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: bunx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
