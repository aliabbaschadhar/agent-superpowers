name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Package and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch ai-skills data
        run: |
          git clone --depth=1 https://github.com/aliabbaschadhar/ai-skills.git /tmp/ai-skills || \
          git clone --depth=1 https://github.com/sickn33/antigravity-awesome-skills.git /tmp/ai-skills
        continue-on-error: true

      - name: Run prebuild
        run: node scripts/prebuild.js
        env:
          AI_SKILLS_ROOT: /tmp/ai-skills

      - name: Build production bundle
        run: node esbuild.config.js --production

      - name: Package .vsix
        run: npm run package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-skills-vsix
          path: "*.vsix"
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.vsix"
          generate_release_notes: true

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
